<!doctype html><html lang='ko'><head><meta charset='utf-8'><meta name='viewport' content='width=1080,height=1350'><title>card</title><style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=Playfair+Display:wght@600;700&display=swap');
*{box-sizing:border-box}html,body{margin:0;width:1080px;height:1350px;overflow:hidden}body{font-family:'Noto Sans KR',system-ui,sans-serif;color:#2A211C}.card{position:relative;width:1080px;height:1350px;overflow:hidden;background:#E9DDCF}.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}.crop-top{object-position:center 28%}.crop-mid{object-position:center 42%}.veil{position:absolute;inset:0;z-index:1}.veil-soft{background:linear-gradient(180deg,rgba(246,239,229,.92) 0%,rgba(246,239,229,.65) 34%,rgba(83,55,38,.08) 67%,rgba(54,36,27,.20) 100%)}.veil-left{background:linear-gradient(90deg,rgba(246,239,229,.95) 0%,rgba(246,239,229,.78) 43%,rgba(246,239,229,.20) 76%,rgba(246,239,229,0) 100%)}.veil-bottom{background:linear-gradient(180deg,rgba(246,239,229,.91) 0%,rgba(246,239,229,.58) 42%,rgba(48,34,26,.28) 100%)}.content{position:absolute;z-index:3;left:96px;right:96px;top:92px}.brand{display:flex;align-items:center;gap:14px;font-size:19px;font-weight:700;letter-spacing:.08em;color:#6D5140;text-transform:uppercase}.brand:before{content:'';width:42px;height:2px;background:#B66D4E;display:block}.eyebrow{margin-top:72px;font-size:24px;line-height:1.25;font-weight:700;color:#A06245;letter-spacing:.015em}.title{margin-top:24px;font-size:80px;line-height:1.08;letter-spacing:-.065em;font-weight:800;color:#2B211B}.title.serif{font-family:'Playfair Display',serif;font-size:98px;line-height:1.02;letter-spacing:-.04em;font-weight:700}.sub{margin-top:32px;max-width:760px;font-size:31px;line-height:1.5;font-weight:500;color:#4A382F;letter-spacing:-.04em}.capsule{display:inline-flex;align-items:center;gap:10px;margin-top:44px;padding:15px 23px;border:1px solid rgba(108,81,64,.28);border-radius:999px;background:rgba(255,255,255,.34);backdrop-filter:blur(14px);font-size:21px;font-weight:700;color:#6D5140}.footer{position:absolute;z-index:4;left:96px;right:96px;bottom:74px;display:flex;align-items:center;justify-content:space-between;color:rgba(70,52,43,.64);font-size:18px;font-weight:700;letter-spacing:.04em}.num{font-family:'Playfair Display',serif;font-size:22px}.quote{position:absolute;z-index:3;left:96px;right:96px;bottom:158px;padding:30px 34px;border-radius:16px;background:rgba(255,252,247,.38);border:1px solid rgba(109,81,64,.18);backdrop-filter:blur(14px);box-shadow:none}.quote .big{font-size:36px;line-height:1.35;font-weight:800;letter-spacing:-.05em;color:#2D221D}.quote .small{margin-top:14px;font-size:24px;line-height:1.45;color:#5C4639;font-weight:500}.roles{position:absolute;z-index:3;left:96px;right:96px;bottom:154px;display:grid;grid-template-columns:1fr 1fr;gap:18px}.role{padding:26px 26px;border-radius:14px;background:rgba(255,252,247,.34);backdrop-filter:blur(14px);border:1px solid rgba(109,81,64,.20);box-shadow:none}.role .k{font-size:20px;font-weight:800;color:#A06245}.role .v{margin-top:10px;font-size:28px;line-height:1.34;font-weight:800;letter-spacing:-.05em;color:#2D221D}.list{position:absolute;z-index:3;left:96px;right:96px;bottom:156px;display:flex;flex-direction:column;gap:18px}.item{display:flex;align-items:center;justify-content:space-between;padding:22px 28px;border-radius:14px;background:rgba(255,252,247,.40);border:1px solid rgba(109,81,64,.20);backdrop-filter:blur(14px);font-size:29px;font-weight:800;letter-spacing:-.045em;color:#2D221D}.item span{font-size:19px;color:#A06245;letter-spacing:.05em}.editorial-cta{position:absolute;z-index:3;left:96px;right:96px;bottom:160px;padding-top:28px;border-top:1px solid rgba(109,81,64,.42)}.editorial-cta .line{font-size:31px;line-height:1.45;font-weight:700;letter-spacing:-.045em;color:#3E3028}.editorial-cta .comment{display:inline-block;margin-top:28px;padding:14px 22px;border:1px solid rgba(109,81,64,.30);border-radius:999px;background:rgba(255,252,247,.32);font-size:23px;font-weight:800;color:#6D5140}.cover-title{font-size:96px}.card04 .title{font-size:76px}.card04 .sub{max-width:710px}.card06 .title{font-size:82px;line-height:1.1}.card06 .eye </style></head><body><section class='card card04'><img class='bg crop-mid' src='assets/bg-premium-desk.png'><div class='veil veil-soft'></div>
