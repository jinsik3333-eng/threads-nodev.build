<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>비개발dev — Card 05</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;font-family:'Noto Sans KR',sans-serif;overflow:hidden}
.card{position:relative;width:1080px;height:1350px;background:linear-gradient(135deg,#FF5E5B 0%,#FF8E8B 60%,#FFB3A7 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 60px;text-align:center}
.grain{position:absolute;inset:0;opacity:0.05;background-image:repeating-linear-gradient(0deg,#FFF 0px,#FFF 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:1}
.content{position:relative;z-index:2}
.pre{font-size:48px;font-weight:700;color:rgba(255,255,255,0.7);margin-bottom:8px}
.big{font-size:130px;font-weight:700;color:#FFF;line-height:1.15;letter-spacing:-5px;text-shadow:0 6px 40px rgba(0,0,0,0.15)}
.big-sub{font-size:52px;font-weight:500;color:#FFF;margin-top:16px;text-shadow:0 2px 20px rgba(0,0,0,0.1)}
.cta-box{background:#FFF;border-radius:28px;padding:48px 56px;margin-top:50px;box-shadow:0 20px 60px rgba(0,0,0,0.2);text-align:center}
.cta-main{font-size:38px;font-weight:900;color:#1A1A24;line-height:1.3}
.cta-sub{font-size:26px;font-weight:400;color:#666;margin-top:12px}
.follow{position:absolute;bottom:80px;left:60px;right:60px;text-align:center;font-size:24px;font-weight:500;color:rgba(255,255,255,0.85);z-index:2}
</style>
</head>
<body><div class="card">
<div class="grain"></div>
<div class="content">
  <div class="pre">비개발자인데</div>
  <div class="big">Claude Code로<br>뭐든 만듭니다</div>
  <div class="big-sub">코딩 몰라도, 디자인 몰라도</div>
  <div class="cta-box">
    <div class="cta-main">💬 댓글에 '비개발'이라고<br>달아주시면</div>
    <div class="cta-sub">Claude Code 입문 가이드 보내드립니다 📩</div>
  </div>
</div>
<div class="follow">팔로우 @비개발dev 하고 업무 자동화 꿀팁 받아가세요</div>
</div></body></html>
