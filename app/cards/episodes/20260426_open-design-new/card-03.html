<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>비개발dev — Card 03</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;font-family:'Noto Sans KR',sans-serif;background:#1A1A24;overflow:hidden}
.card{position:relative;width:1080px;height:1350px;padding:70px 50px 50px}
.if-label{font-size:44px;font-weight:400;color:rgba(255,255,255,0.9);line-height:1.4}
.if-label em{font-style:normal;color:#FF5E5B;font-weight:700}
.step{position:absolute;top:70px;right:70px;font-family:'JetBrains Mono',monospace;font-size:18px;color:rgba(255,255,255,0.4)}
.macbook{position:relative;width:780px;margin:10px auto 0}
.macbook-lid{background:#3A3A44;border-radius:18px 18px 0 0;padding:10px 10px 0;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.macbook-screen{background:#000;border-radius:10px 10px 0 0;overflow:hidden;aspect-ratio:16/10}
.macbook-screen img{width:100%;height:100%;object-fit:cover;object-position:top}
.macbook-bottom{background:#333;height:12px;border-radius:0 0 10px 10px}
.macbook-notch{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:100px;height:6px;background:#2A2A34;border-radius:0 0 6px 6px}
.macbook-base{width:620px;height:5px;background:#444;border-radius:0 0 6px 6px;margin:0 auto}
.then{position:absolute;bottom:180px;left:50px;right:50px}
.then-main{font-size:72px;font-weight:900;color:#FF5E5B;line-height:0.95;letter-spacing:-3px}
.then-sub{font-size:32px;font-weight:400;color:rgba(255,255,255,0.7);margin-top:16px}
.footer{position:absolute;bottom:40px;left:70px;right:70px;display:flex;justify-content:space-between;font-size:16px;color:rgba(255,255,255,0.4);font-family:'JetBrains Mono',monospace}
</style>
</head>
<body><div class="card">
<div class="if-label">포토샵, 피그마 배우느라<br><em>몇 달을 허비했습니다</em></div>
<div class="step">03/05</div>
<div class="macbook">
  <div class="macbook-lid">
    <div class="macbook-screen"><img src="screenshots/04-todo-progress.png" alt=""></div>
  </div>
  <div class="macbook-bottom"><div class="macbook-notch"></div></div>
</div>
<div class="macbook-base"></div>
<div class="then">
  <div class="then-main">이제 Claude Code가<br>다 합니다</div>
  <div class="then-sub">알아서 작업 계획 짜고, 실행까지</div>
</div>
<div class="footer"><span>비개발dev</span><span>03/05</span></div>
</div></body></html>
