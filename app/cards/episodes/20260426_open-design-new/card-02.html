<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>비개발dev — Card 02</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;font-family:'Noto Sans KR',sans-serif;background:#FAFAFA;overflow:hidden}
.card{position:relative;width:1080px;height:1350px;padding:70px 50px 50px}
.if-label{font-size:44px;font-weight:400;color:#1A1A24;line-height:1.4}
.if-label em{font-style:normal;color:#FF5E5B;font-weight:700}
.step{position:absolute;top:70px;right:70px;font-family:'JetBrains Mono',monospace;font-size:18px;color:rgba(26,26,36,0.4)}
.browser{background:#FFF;border-radius:16px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.12),0 0 0 1px rgba(0,0,0,0.06);margin-top:40px}
.browser-bar{height:44px;background:#F0F0F4;display:flex;align-items:center;padding:0 16px;gap:8px}
.dot{width:11px;height:11px;border-radius:50%}.dot.r{background:#FF5F57}.dot.y{background:#FEBC2E}.dot.g{background:#28C840}
.url-bar{flex:1;margin-left:12px;height:26px;border-radius:6px;background:#FFF;border:1px solid #E0E0E4;display:flex;align-items:center;padding:0 10px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#999}
.browser-body{overflow:hidden}
.browser-body img{width:100%;display:block}
.then{position:absolute;bottom:260px;right:50px;text-align:right}
.then-label{font-size:32px;font-weight:700;color:#1A1A24}
.then-action{display:inline-block;background:#FF5E5B;color:#FFF;padding:16px 32px;border-radius:16px;font-size:36px;font-weight:900;margin-top:12px;box-shadow:0 8px 30px rgba(255,94,91,0.35)}
.footer{position:absolute;bottom:50px;left:70px;right:70px;display:flex;justify-content:space-between;font-size:18px;color:rgba(26,26,36,0.4);font-family:'JetBrains Mono',monospace}
</style>
</head>
<body><div class="card">
<div class="if-label">월말 보고서에<br><em>야근하는 당신</em>,</div>
<div class="step">02/05</div>
<div class="browser">
  <div class="browser-bar">
    <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    <div class="url-bar">open-design.local/new</div>
  </div>
  <div class="browser-body"><img src="screenshots/02-question-form.png" alt=""></div>
</div>
<div class="then">
  <div class="then-label">Claude Code에</div>
  <div class="then-action">한 마디면 끝</div>
</div>
<div class="footer"><span>비개발dev</span><span>02/05</span></div>
</div></body></html>
