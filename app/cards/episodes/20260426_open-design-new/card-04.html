<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>비개발dev — Card 04</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;font-family:'Noto Sans KR',sans-serif;background:#FAFAFA;overflow:hidden}
.card{position:relative;width:1080px;height:1350px;padding:60px 40px 40px}
.headline{font-size:82px;font-weight:900;color:#1A1A24;letter-spacing:-3px;line-height:1.1;margin-bottom:8px}
.headline-sub{font-size:36px;font-weight:700;color:#FF5E5B}
.step{position:absolute;top:70px;right:70px;font-family:'JetBrains Mono',monospace;font-size:18px;color:rgba(26,26,36,0.4)}
.showcase{position:relative;display:flex;align-items:flex-start;justify-content:center;margin-top:0;height:850px}
.macbook{position:absolute;left:10px;top:0;width:680px;z-index:1}
.macbook-lid{background:#D8D8E0;border-radius:16px 16px 0 0;padding:8px 8px 0;box-shadow:0 16px 50px rgba(0,0,0,0.15)}
.macbook-screen{background:#000;border-radius:10px 10px 0 0;overflow:hidden;aspect-ratio:16/10}
.macbook-screen img{width:100%;height:100%;object-fit:cover;object-position:top}
.macbook-bottom{background:#C0C0CC;height:10px;border-radius:0 0 10px 10px}
.iphone{position:absolute;right:30px;top:0;width:240px;z-index:5;transform:rotate(5deg)}
.iphone-body{background:#0E0E12;border-radius:44px;padding:8px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.iphone-notch{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:70px;height:20px;background:#0E0E12;border-radius:12px;z-index:3}
.iphone-screen{border-radius:38px;overflow:hidden;background:#FFF;aspect-ratio:9/19.5}
.iphone-screen img{width:100%;height:100%;object-fit:cover;object-position:top}
.tagline{position:absolute;bottom:200px;left:50px;right:50px;text-align:right}
.tagline-text{display:inline-block;background:#1A1A24;color:#FFF;padding:14px 32px;border-radius:12px;font-size:28px;font-weight:700}
.footer{position:absolute;bottom:40px;left:70px;right:70px;display:flex;justify-content:space-between;font-size:16px;color:rgba(26,26,36,0.4);font-family:'JetBrains Mono',monospace}
</style>
</head>
<body><div class="card">
<div class="headline">잡지. 앱. PPT.</div>
<div class="headline-sub">한 번에 나옵니다</div>
<div class="step">04/05</div>
<div class="showcase">
  <div class="macbook">
    <div class="macbook-lid">
      <div class="macbook-screen"><img src="screenshots/07-magazine-deck.png" alt=""></div>
    </div>
    <div class="macbook-bottom"></div>
  </div>
  <div class="iphone">
    <div class="iphone-body">
      <div class="iphone-notch"></div>
      <div class="iphone-screen"><img src="screenshots/08-mobile-app.png" alt=""></div>
    </div>
  </div>
</div>
<div class="tagline"><span class="tagline-text">비개발자가 직접 만든 결과물</span></div>
<div class="footer"><span>비개발dev</span><span>04/05</span></div>
</div></body></html>
