<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Open Design — Card 01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    font-family: 'Noto Sans KR', sans-serif;
    background: #1E1E24;
    overflow: hidden;
  }
  .card {
    position: relative;
    width: 1080px;
    height: 1350px;
    background:
      radial-gradient(circle at 20% 10%, rgba(255, 107, 107, 0.18) 0%, transparent 45%),
      radial-gradient(circle at 80% 90%, rgba(78, 205, 196, 0.14) 0%, transparent 50%),
      #1E1E24;
    overflow: hidden;
  }
  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image:
      repeating-linear-gradient(0deg, #FFFFFF 0px, #FFFFFF 1px, transparent 1px, transparent 3px);
    pointer-events: none;
  }
  .title {
    position: absolute;
    top: 110px;
    left: 80px;
    right: 80px;
    font-size: 130px;
    font-weight: 900;
    letter-spacing: -7px;
    line-height: 0.92;
    color: #FF6B6B;
    text-shadow: 0 6px 50px rgba(255, 107, 107, 0.45);
  }
  .title .row2 {
    color: #FEF9F3;
    text-shadow: none;
  }
  .tag {
    position: absolute;
    top: 80px;
    right: 80px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 999px;
    padding: 12px 22px;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 2px;
    color: #FEF9F3;
    backdrop-filter: blur(10px);
  }
  .tag .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4ECDC4;
    box-shadow: 0 0 12px rgba(78, 205, 196, 0.8);
  }
  .phone-wrap {
    position: absolute;
    bottom: 130px;
    left: 50%;
    transform: translateX(-50%) rotate(-3deg);
    width: 460px;
  }
  .phone {
    position: relative;
    background: #0E0E12;
    border-radius: 56px;
    padding: 14px;
    box-shadow:
      0 0 0 2px rgba(255, 255, 255, 0.06),
      0 60px 120px rgba(0, 0, 0, 0.6),
      0 20px 50px rgba(255, 107, 107, 0.18);
  }
  .phone::before {
    content: "";
    position: absolute;
    top: 26px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 28px;
    background: #0E0E12;
    border-radius: 18px;
    z-index: 3;
  }
  .phone-screen {
    border-radius: 44px;
    overflow: hidden;
    background: #FFFFFF;
    aspect-ratio: 9 / 19.5;
    position: relative;
  }
  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }
  .footer {
    position: absolute;
    bottom: 60px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 24px;
    font-weight: 500;
    color: rgba(254, 249, 243, 0.72);
    letter-spacing: 0.5px;
  }
  .footer .star {
    color: #FFD93D;
  }
  .corner {
    position: absolute;
    bottom: 80px;
    left: 80px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: rgba(254, 249, 243, 0.4);
    letter-spacing: 1px;
  }
  .corner-r {
    position: absolute;
    bottom: 80px;
    right: 80px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: rgba(254, 249, 243, 0.4);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="grain"></div>
    <div class="tag"><span class="dot"></span>OPEN SOURCE · v1</div>
    <h1 class="title">Open<br><span class="row2">Design</span></h1>
    <div class="phone-wrap">
      <div class="phone">
        <div class="phone-screen">
          <img src="screenshots/08-mobile-app.png" alt="Open Design 모바일 앱 결과물">
        </div>
      </div>
    </div>
    <div class="corner">// no-code · ai-native</div>
    <div class="corner-r">OD-2026</div>
    <div class="footer">비개발dev · 직접 만든 비개발자 시리즈 &nbsp;<span class="star">★</span> 5,100</div>
  </div>
</body>
</html>
