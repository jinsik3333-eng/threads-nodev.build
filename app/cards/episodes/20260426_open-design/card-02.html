<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Open Design — Card 02</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    font-family: 'Noto Sans KR', sans-serif;
    background: #FEF9F3;
    overflow: hidden;
  }
  .card {
    position: relative;
    width: 1080px;
    height: 1350px;
    background:
      radial-gradient(circle at 90% 5%, rgba(255, 107, 107, 0.10) 0%, transparent 40%),
      radial-gradient(circle at 5% 95%, rgba(78, 205, 196, 0.10) 0%, transparent 45%),
      #FEF9F3;
    overflow: hidden;
  }
  .label-row {
    position: absolute;
    top: 110px;
    left: 90px;
    right: 90px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .label {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 24px;
    font-weight: 500;
    color: #1E1E24;
    letter-spacing: 0.3px;
  }
  .label::before {
    content: "";
    width: 36px;
    height: 1.5px;
    background: #1E1E24;
    display: inline-block;
  }
  .step {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #1E1E24;
    opacity: 0.5;
  }
  .browser {
    position: absolute;
    top: 220px;
    left: 60px;
    right: 60px;
    background: #FFFFFF;
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 40px 100px rgba(30, 30, 36, 0.18),
      0 12px 32px rgba(30, 30, 36, 0.10),
      0 0 0 1px rgba(30, 30, 36, 0.06);
  }
  .terminal {
    position: absolute;
    bottom: 210px;
    left: 100px;
    right: 100px;
    background: #0E0E12;
    border: 1px solid #333;
    border-radius: 12px;
    overflow: hidden;
    z-index: 5;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .terminal-bar {
    height: 34px;
    background: #1A1A20;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
  }
  .terminal-bar .tdot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .terminal-bar .tdot.r { background: #555; }
  .terminal-bar .tdot.y { background: #666; }
  .terminal-bar .tdot.g { background: #777; }
  .terminal-bar .ttitle {
    flex: 1;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #888;
  }
  .terminal-body {
    padding: 16px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: #4ECDC4;
    line-height: 1.6;
  }
  .terminal-body .prompt {
    color: #4ECDC4;
  }
  .terminal-body .cursor {
    display: inline-block;
    width: 10px;
    height: 18px;
    background: #4ECDC4;
    vertical-align: text-bottom;
    margin-left: 2px;
  }
  .browser-bar {
    height: 52px;
    background: #F1F1F4;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 10px;
    border-bottom: 1px solid #E2E2E8;
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
  }
  .dot.r { background: #FF5F57; }
  .dot.y { background: #FEBC2E; }
  .dot.g { background: #28C840; }
  .url {
    flex: 1;
    margin-left: 18px;
    height: 30px;
    border-radius: 8px;
    background: #FFFFFF;
    border: 1px solid #E2E2E8;
    display: flex;
    align-items: center;
    padding: 0 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #6B6B75;
    max-width: 520px;
  }
  .url::before {
    content: "🔒";
    font-size: 11px;
    margin-right: 8px;
  }
  .browser-shot {
    display: block;
    width: 100%;
    background: #FFFFFF;
  }
  .caption {
    position: absolute;
    bottom: 200px;
    left: 90px;
    right: 90px;
    font-size: 38px;
    font-weight: 700;
    line-height: 1.35;
    color: #1E1E24;
    letter-spacing: -0.5px;
  }
  .caption .quote {
    display: inline-block;
    background: #1E1E24;
    color: #FEF9F3;
    padding: 4px 16px 8px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 30px;
    font-weight: 500;
    letter-spacing: -0.3px;
  }
  .caption .arrow {
    color: #FF6B6B;
    font-weight: 900;
  }
  .footer {
    position: absolute;
    bottom: 70px;
    left: 90px;
    right: 90px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 20px;
    color: #1E1E24;
    opacity: 0.55;
    font-weight: 500;
  }
  .footer .accent {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #FF6B6B;
    display: inline-block;
    margin-right: 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="label-row">
      <div class="label">무엇을 만들고 싶은지 말만 하면</div>
      <div class="step">02 / 05</div>
    </div>
    <div class="browser">
      <div class="browser-bar">
        <div class="dot r"></div>
        <div class="dot y"></div>
        <div class="dot g"></div>
        <div class="url">open-design.local /new</div>
      </div>
      <img class="browser-shot" src="screenshots/02-question-form.png" alt="Open Design 질문 폼">
    </div>
    <div class="caption">
      <span class="quote">Make me a magazine-style pitch deck</span> &nbsp;<span class="arrow">→</span>
    </div>
    <div class="terminal">
      <div class="terminal-bar">
        <div class="tdot r"></div>
        <div class="tdot y"></div>
        <div class="tdot g"></div>
        <div class="ttitle">claude-code — -zsh</div>
      </div>
      <div class="terminal-body">
        <span class="prompt">$</span> claude<br>
        <span class="prompt">&gt;</span> Make me a magazine pitch deck<span class="cursor"></span>
      </div>
    </div>
    <div class="footer">
      <span><span class="accent"></span>비개발dev · 직접 만든 비개발자 시리즈</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:18px;">OD-2026</span>
    </div>
  </div>
</body>
</html>
