<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Open Design — Card 03</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    font-family: 'Noto Sans KR', sans-serif;
    background: #1E1E24;
    overflow: hidden;
  }
  .card {
    position: relative;
    width: 1080px;
    height: 1350px;
    background:
      radial-gradient(circle at 100% 0%, rgba(255, 107, 107, 0.18) 0%, transparent 35%),
      radial-gradient(circle at 0% 100%, rgba(78, 205, 196, 0.14) 0%, transparent 45%),
      #1E1E24;
    overflow: hidden;
  }
  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image:
      repeating-linear-gradient(0deg, #FFFFFF 0px, #FFFFFF 1px, transparent 1px, transparent 3px);
    pointer-events: none;
  }
  .label-row {
    position: absolute;
    top: 110px;
    left: 90px;
    right: 90px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .label {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 24px;
    font-weight: 500;
    color: #FEF9F3;
    letter-spacing: 0.3px;
  }
  .label::before {
    content: "";
    width: 36px;
    height: 1.5px;
    background: #FEF9F3;
    display: inline-block;
    opacity: 0.6;
  }
  .step {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #FEF9F3;
    opacity: 0.5;
  }
  .browser {
    position: absolute;
    top: 290px;
    left: 60px;
    right: 60px;
    background: #FFFFFF;
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 50px 120px rgba(0, 0, 0, 0.55),
      0 16px 40px rgba(0, 0, 0, 0.35),
      0 0 0 1px rgba(255, 255, 255, 0.05);
  }
  .terminal {
    position: absolute;
    bottom: 155px;
    left: 130px;
    right: 130px;
    background: #0E0E12;
    border: 1px solid #333;
    border-radius: 12px;
    overflow: hidden;
    z-index: 5;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .terminal-bar {
    height: 34px;
    background: #1A1A20;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
  }
  .terminal-bar .tdot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .terminal-bar .tdot.r { background: #555; }
  .terminal-bar .tdot.y { background: #666; }
  .terminal-bar .tdot.g { background: #777; }
  .terminal-bar .ttitle {
    flex: 1;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #888;
  }
  .terminal-body {
    padding: 14px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: #4ECDC4;
    line-height: 1.6;
  }
  .terminal-body .prompt {
    color: #4ECDC4;
  }
  .terminal-body .cursor {
    display: inline-block;
    width: 10px;
    height: 16px;
    background: #4ECDC4;
    vertical-align: text-bottom;
    margin-left: 2px;
  }
  .browser-bar {
    height: 52px;
    background: #F1F1F4;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 10px;
    border-bottom: 1px solid #E2E2E8;
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
  }
  .dot.r { background: #FF5F57; }
  .dot.y { background: #FEBC2E; }
  .dot.g { background: #28C840; }
  .url {
    flex: 1;
    margin-left: 18px;
    height: 30px;
    border-radius: 8px;
    background: #FFFFFF;
    border: 1px solid #E2E2E8;
    display: flex;
    align-items: center;
    padding: 0 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #6B6B75;
    max-width: 520px;
  }
  .url::before {
    content: "⚡";
    font-size: 11px;
    margin-right: 8px;
  }
  .browser-shot {
    display: block;
    width: 100%;
    background: #FFFFFF;
  }
  .bubble {
    position: absolute;
    top: 200px;
    right: 80px;
    background: #FF6B6B;
    color: #FFFFFF;
    padding: 18px 26px;
    border-radius: 22px 22px 6px 22px;
    font-size: 24px;
    font-weight: 700;
    line-height: 1.3;
    max-width: 420px;
    box-shadow:
      0 20px 50px rgba(255, 107, 107, 0.45),
      0 6px 16px rgba(255, 107, 107, 0.3);
    transform: rotate(2deg);
    z-index: 10;
  }
  .bubble::after {
    content: "";
    position: absolute;
    bottom: -10px;
    right: 32px;
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-top: 14px solid #FF6B6B;
  }
  .bubble .blink {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #FFFFFF;
    margin-right: 8px;
    box-shadow: 0 0 10px #FFFFFF;
    vertical-align: middle;
  }
  .meta {
    position: absolute;
    bottom: 70px;
    left: 90px;
    right: 90px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: #FEF9F3;
    opacity: 0.55;
    font-size: 20px;
    font-weight: 500;
    z-index: 30;
  }
  .meta .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border: 1px solid rgba(254, 249, 243, 0.25);
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
  }
  .meta .pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4ECDC4;
    box-shadow: 0 0 10px #4ECDC4;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="grain"></div>
    <div class="label-row">
      <div class="label">AI가 알아서 작업을 쪼갠다</div>
      <div class="step">03 / 05</div>
    </div>
    <div class="bubble"><span class="blink"></span>AI가 실시간으로<br>작업 계획을 짜줌</div>
    <div class="browser">
      <div class="browser-bar">
        <div class="dot r"></div>
        <div class="dot y"></div>
        <div class="dot g"></div>
        <div class="url">open-design.local /run</div>
      </div>
      <img class="browser-shot" src="screenshots/04-todo-progress.png" alt="실시간 작업 진행">
    </div>
    <div class="meta">
      <span><span class="accent" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#FF6B6B;margin-right:8px;vertical-align:middle;"></span>비개발dev · 직접 만든 비개발자 시리즈</span>
      <span class="badge"><span class="pulse"></span>LIVE</span>
    </div>
    <div class="terminal">
      <div class="terminal-bar">
        <div class="tdot r"></div>
        <div class="tdot y"></div>
        <div class="tdot g"></div>
        <div class="ttitle">claude-code — -zsh</div>
      </div>
      <div class="terminal-body">
        <span class="prompt">$</span> claude<br>
        <span class="prompt">✓</span> Generating design assets...<span class="cursor"></span>
      </div>
    </div>
  </div>
</body>
</html>
