<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Open Design — Card 04</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    font-family: 'Noto Sans KR', sans-serif;
    background: #FEF9F3;
    overflow: hidden;
  }
  .card {
    position: relative;
    width: 1080px;
    height: 1350px;
    background:
      radial-gradient(circle at 90% 5%, rgba(255, 107, 107, 0.10) 0%, transparent 40%),
      radial-gradient(circle at 5% 95%, rgba(78, 205, 196, 0.10) 0%, transparent 45%),
      #FEF9F3;
    overflow: hidden;
  }
  .label-row {
    position: absolute;
    top: 110px;
    left: 90px;
    right: 90px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .label {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 24px;
    font-weight: 500;
    color: #1E1E24;
    letter-spacing: 0.3px;
  }
  .label::before {
    content: "";
    width: 36px;
    height: 1.5px;
    background: #1E1E24;
    display: inline-block;
  }
  .step {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #1E1E24;
    opacity: 0.5;
  }
  .browser {
    position: absolute;
    top: 200px;
    left: 60px;
    width: 560px;
    background: #FFFFFF;
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 40px 100px rgba(30, 30, 36, 0.18),
      0 12px 32px rgba(30, 30, 36, 0.10),
      0 0 0 1px rgba(30, 30, 36, 0.06);
    z-index: 1;
  }
  .browser-bar {
    height: 48px;
    background: #F1F1F4;
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 9px;
    border-bottom: 1px solid #E2E2E8;
  }
  .dot {
    width: 13px;
    height: 13px;
    border-radius: 50%;
  }
  .dot.r { background: #FF5F57; }
  .dot.y { background: #FEBC2E; }
  .dot.g { background: #28C840; }
  .url {
    flex: 1;
    margin-left: 16px;
    height: 28px;
    border-radius: 7px;
    background: #FFFFFF;
    border: 1px solid #E2E2E8;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #6B6B75;
  }
  .browser-shot {
    display: block;
    width: 100%;
    background: #FFFFFF;
  }
  .phone-wrap {
    position: absolute;
    bottom: 90px;
    right: 60px;
    width: 280px;
    transform: rotate(5deg);
    z-index: 10;
  }
  .phone {
    position: relative;
    background: #0E0E12;
    border-radius: 44px;
    padding: 10px;
    box-shadow:
      0 0 0 2px rgba(255, 255, 255, 0.06),
      0 40px 90px rgba(0, 0, 0, 0.5),
      0 14px 35px rgba(255, 107, 107, 0.15);
  }
  .phone::before {
    content: "";
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 22px;
    background: #0E0E12;
    border-radius: 14px;
    z-index: 3;
  }
  .phone-screen {
    border-radius: 36px;
    overflow: hidden;
    background: #FFFFFF;
    aspect-ratio: 9 / 19.5;
    position: relative;
  }
  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
.footer {
    position: absolute;
    bottom: 70px;
    left: 90px;
    right: 90px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 20px;
    font-weight: 500;
    color: #1E1E24;
    opacity: 0.55;
    z-index: 20;
  }
  .footer .accent {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #FF6B6B;
    display: inline-block;
  }
  .headline {
    position: absolute;
    bottom: 90px;
    right: 50%;
    transform: translateX(50%);
    font-size: 28px;
    font-weight: 700;
    color: #1E1E24;
    z-index: 20;
    text-align: right;
    line-height: 1.3;
    opacity: 0.8;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="label-row">
      <div class="label">잡지, 앱, PPT — 한 번에</div>
      <div class="step">04 / 05</div>
    </div>
    <div class="browser">
      <div class="browser-bar">
        <div class="dot r"></div>
        <div class="dot y"></div>
        <div class="dot g"></div>
        <div class="url">open-design.local /export</div>
      </div>
      <img class="browser-shot" src="screenshots/07-magazine-deck.png" alt="잡지 스타일 결과물">
    </div>
    <div class="phone-wrap">
      <div class="phone">
        <div class="phone-screen">
          <img src="screenshots/08-mobile-app.png" alt="모바일 앱 결과물">
        </div>
      </div>
    </div>
    <div class="footer">
      <span><span class="accent"></span>비개발dev · 직접 만든 비개발자 시리즈</span>
      <span class="step">OD-2026</span>
    </div>
  </div>
</body>
</html>
