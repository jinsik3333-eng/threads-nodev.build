<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F5F3FF"/><stop offset="1" stop-color="#EFF6FF"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#6366F1" flood-opacity="0.16"/></filter></defs>
<rect width="1200" height="760" rx="36" fill="url(#bg)"/>
<text x="64" y="84" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="38" font-weight="800" fill="#111827">파일 여러 개를 결과물 하나로</text>
<text x="64" y="126" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="22" font-weight="500" fill="#6B7280">첫 프로젝트는 “폴더 → Claude → 결과 파일”만 확인하면 됩니다.</text>
<g filter="url(#shadow)"><rect x="70" y="190" width="300" height="390" rx="28" fill="#FFFFFF" stroke="#E5E7EB"/>
<circle cx="108" cy="232" r="15" fill="#6366F1" opacity="0.18"/><circle cx="108" cy="232" r="7" fill="#6366F1"/>
<text x="138" y="240" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800" fill="#111827">1. 자료 폴더</text>
<text x="104" y="288" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">회의록.txt</text>
<text x="104" y="322" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">매출.csv</text>
<text x="104" y="356" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">고객메모.docx</text>
<text x="104" y="390" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563"></text>
<text x="104" y="424" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">왼쪽 파일 목록에 보이면 OK</text>
</g>
<g filter="url(#shadow)"><rect x="450" y="190" width="300" height="390" rx="28" fill="#FFFFFF" stroke="#E5E7EB"/>
<circle cx="488" cy="232" r="15" fill="#8B5CF6" opacity="0.18"/><circle cx="488" cy="232" r="7" fill="#8B5CF6"/>
<text x="518" y="240" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800" fill="#111827">2. Claude에게 요청</text>
<text x="484" y="288" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">이 파일들 읽고</text>
<text x="484" y="322" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">핵심만 정리해줘</text>
<text x="484" y="356" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563"></text>
<text x="484" y="390" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">복사한 문장을 붙여넣기</text>
</g>
<g filter="url(#shadow)"><rect x="830" y="190" width="300" height="390" rx="28" fill="#FFFFFF" stroke="#E5E7EB"/>
<circle cx="868" cy="232" r="15" fill="#10B981" opacity="0.18"/><circle cx="868" cy="232" r="7" fill="#10B981"/>
<text x="898" y="240" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800" fill="#111827">3. 결과 확인</text>
<text x="864" y="288" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">output/요약.md</text>
<text x="864" y="322" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">보고서 초안.md</text>
<text x="864" y="356" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563"></text>
<text x="864" y="390" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">파일이 생기면 성공</text>
</g>
</svg>