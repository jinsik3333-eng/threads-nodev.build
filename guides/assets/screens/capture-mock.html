<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Guide screen capture mock</title>
<style>
:root{--bg:#f4f2ff;--ink:#17172a;--muted:#757596;--primary:#6366f1;--line:#e5e1f6}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(135deg,#fbfbff,#f1edff);font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Apple SD Gothic Neo','Segoe UI',sans-serif;color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:34px}.shot{width:1120px;height:700px;border-radius:34px;background:white;box-shadow:0 28px 80px rgba(72,70,140,.2);border:1px solid rgba(99,102,241,.12);overflow:hidden;position:relative}.label{position:absolute;left:34px;bottom:24px;color:#8888aa;font-size:18px;font-weight:700}.terminal{position:absolute;left:64px;right:64px;top:66px;bottom:76px;background:#111827;border-radius:24px;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}.termbar{height:58px;background:#0b1220;display:flex;align-items:center;gap:10px;padding:0 22px;color:#9ca3af;font-size:18px}.dot{width:13px;height:13px;border-radius:50%}.r{background:#ff5f57}.y{background:#febc2e}.g{background:#28c840}.term-title{position:absolute;left:0;right:0;text-align:center;color:#aab1c3;font-size:18px}.term-body{padding:34px 40px;font:26px/1.75 Menlo,Consolas,monospace;color:#e5e7eb}.prompt{color:#9ca3af}.cmd{color:#f9fafb}.ok{color:#86efac}.warn{color:#fbbf24}.err{color:#fca5a5}.hint{position:absolute;right:88px;bottom:100px;background:#6366f1;color:white;padding:14px 20px;border-radius:999px;font-size:20px;font-weight:800;box-shadow:0 16px 36px rgba(99,102,241,.3)}.ide{position:absolute;left:54px;right:54px;top:50px;bottom:76px;background:#1f2033;border-radius:26px;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}.ide-top{height:56px;background:#171827;display:flex;align-items:center;padding:0 20px;color:#cfd1ee;font-weight:800}.sidebar{position:absolute;left:0;top:56px;bottom:0;width:290px;background:#25263a;border-right:1px solid rgba(255,255,255,.08);padding:26px 22px}.file{color:#e8e8ff;font-size:22px;line-height:2.05;white-space:pre}.editor{position:absolute;left:290px;right:0;top:56px;bottom:210px;background:#111827;padding:34px 42px;font:24px/1.8 Menlo,Consolas,monospace;color:#e5e7eb}.panel{position:absolute;left:290px;right:0;bottom:0;height:210px;background:#0b1220;border-top:1px solid rgba(255,255,255,.08);padding:24px 42px;font:23px/1.7 Menlo,Consolas,monospace;color:#e5e7eb}.callout{position:absolute;right:82px;top:86px;background:white;color:#303052;border:1px solid var(--line);border-radius:18px;padding:16px 20px;box-shadow:0 18px 40px rgba(30,30,70,.16);font-size:20px;font-weight:850}.arrow{position:absolute;width:120px;height:4px;background:#6366f1;border-radius:99px}.arrow:after{content:"";position:absolute;right:-2px;top:-7px;border-left:14px solid #6366f1;border-top:9px solid transparent;border-bottom:9px solid transparent}.diagram{position:absolute;inset:56px 64px 92px;background:#f8f7ff;border:1px solid #e8e4f8;border-radius:30px;padding:52px}.d-title{font-size:42px;font-weight:900;letter-spacing:-.04em;margin-bottom:20px}.d-sub{font-size:24px;color:#5f5f80;margin-bottom:44px}.row{display:flex;gap:12px;align-items:center;margin:24px 0;flex-wrap:nowrap}.box{background:white;border:1px solid #ded8f6;border-radius:22px;padding:22px 20px;font-size:24px;font-weight:850;box-shadow:0 10px 26px rgba(99,102,241,.08);min-width:178px;text-align:center}.chev{font-size:30px;color:#6366f1;font-weight:900;flex:0 0 auto}.badge{display:inline-block;background:#eef2ff;color:#4f46e5;border-radius:999px;padding:9px 16px;font-weight:900;font-size:18px;margin-bottom:16px}
</style>
</head><body><div class="shot" id="shot"></div><script>
const scene = new URLSearchParams(location.search).get('scene') || 'terminal-install';
const el=document.getElementById('shot');
const terminal=(title,lines,hint)=>`<div class="terminal"><div class="termbar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">${title}</span></div><div class="term-body">${lines.map(l=>`<div>${l}</div>`).join('')}</div></div><div class="hint">${hint}</div>`;
const ide=()=>`<div class="ide"><div class="ide-top">Cursor — my-first-project</div><div class="sidebar"><div class="file">📁 my-first-project\n  📄 CLAUDE.md\n  📄 input.txt\n  📄 result.md\n  📁 assets</div></div><div class="editor"><div><span class="prompt"># result.md</span></div><div>회의록 요약</div><div>- 결정사항 3개</div><div>- 액션아이템 5개</div><div>- 다음 미팅 준비물</div></div><div class="panel"><div><span class="prompt">$</span> <span class="cmd">claude</span></div><div><span class="prompt">></span> 이 폴더 파일을 읽고 요약해줘</div><div><span class="ok">✓ result.md 파일 생성 완료</span></div></div></div><div class="callout">왼쪽 파일 목록 + 아래 터미널을 같이 봅니다</div><div class="label">@nodev.builder · Cursor/VS Code 화면 예시</div>`;
const diagram=(title,sub,items)=>`<div class="diagram"><span class="badge">화면으로 이해하기</span><div class="d-title">${title}</div><div class="d-sub">${sub}</div><div class="row">${items.map((it,i)=>`${i?'<span class="chev">→</span>':''}<div class="box">${it}</div>`).join('')}</div></div>`;
const scenes={
 'terminal-install': terminal('Terminal', ['<span class="prompt">$</span> <span class="cmd">npm install -g @anthropic-ai/claude-code</span>','<span class="ok">✓ installed claude-code</span>','<span class="prompt">$</span> <span class="cmd">claude</span>'], '여기에 붙여넣고 Enter'),
 'terminal-success': terminal('Claude Code', ['<span class="prompt">$</span> <span class="cmd">claude</span>','<span class="ok">Claude Code 시작됨</span>','<span class="prompt">></span> 안녕','<span class="ok">✓ 안녕하세요! 무엇을 도와드릴까요?</span>'], '답변이 보이면 성공'),
 'terminal-error': terminal('Terminal — 오류 예시', ['<span class="prompt">$</span> <span class="cmd">claude</span>','<span class="err">command not found: claude</span>','<span class="warn">설치가 안 된 상태입니다</span>','<span class="prompt">$</span> <span class="cmd">npm install -g @anthropic-ai/claude-code</span>'], '이 문구면 재설치'),
 'cursor-project': ide(),
 'folder-structure': diagram('작업 폴더는 이렇게 나누세요','처음엔 폴더 이름만 정리해도 충분합니다',['Workspace','회의록','콘텐츠','리서치']),
 'claude-md': diagram('CLAUDE.md는 작업 설명서입니다','Claude에게 매번 말할 규칙을 미리 적어둡니다',['목표','규칙','결과 형식','검수 기준'])
};
el.innerHTML=scenes[scene]||scenes['terminal-install'];
</script></body></html>
