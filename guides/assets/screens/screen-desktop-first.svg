<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="screenBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1f1e1b"/>
      <stop offset="1" stop-color="#171713"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity=".38"/>
    </filter>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity=".28"/>
    </filter>
  </defs>

  <!-- Claude Desktop 첫 화면 참고 이미지 -->
  <rect width="1280" height="720" rx="0" fill="url(#screenBg)"/>

  <!-- macOS window controls -->
  <circle cx="18" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="58" cy="18" r="6" fill="#28c840"/>
  <rect x="78" y="14" width="14" height="2" rx="1" fill="#7a7770" opacity=".75"/>
  <rect x="78" y="20" width="14" height="2" rx="1" fill="#7a7770" opacity=".55"/>

  <!-- top-right small icon -->
  <circle cx="1256" cy="19" r="9" fill="none" stroke="#b7b2a8" stroke-width="1.4" opacity=".75"/>
  <path d="M1251 22c1.6-2.2 3.2-3.2 5-3.2s3.4 1 5 3.2" fill="none" stroke="#b7b2a8" stroke-width="1.3" opacity=".75"/>

  <!-- center greeting -->
  <g transform="translate(0,8)">
    <text x="640" y="262" text-anchor="middle" font-size="29" fill="#a9a39a" font-weight="500" font-family="Pretendard, -apple-system, BlinkMacSystemFont, Arial">다시 오셨네요!</text>
    <g transform="translate(488,244) scale(.9)">
      <circle cx="0" cy="0" r="5" fill="#d36d4b"/>
      <g stroke="#d36d4b" stroke-width="3" stroke-linecap="round">
        <line x1="0" y1="-15" x2="0" y2="-8"/>
        <line x1="0" y1="8" x2="0" y2="15"/>
        <line x1="-15" y1="0" x2="-8" y2="0"/>
        <line x1="8" y1="0" x2="15" y2="0"/>
        <line x1="-10.6" y1="-10.6" x2="-5.6" y2="-5.6"/>
        <line x1="5.6" y1="5.6" x2="10.6" y2="10.6"/>
        <line x1="10.6" y1="-10.6" x2="5.6" y2="-5.6"/>
        <line x1="-5.6" y1="5.6" x2="-10.6" y2="10.6"/>
      </g>
    </g>
  </g>

  <!-- prompt box -->
  <g filter="url(#softShadow)">
    <rect x="353" y="313" width="574" height="105" rx="15" fill="#2b2b28" stroke="#353530" stroke-width="1"/>
    <text x="371" y="347" font-size="13" fill="#a19c92" font-family="Pretendard, -apple-system, BlinkMacSystemFont, Arial">오늘 어떤 도움을 드릴까요?</text>
    <text x="371" y="397" font-size="28" fill="#aaa59b" font-family="Pretendard, -apple-system, BlinkMacSystemFont, Arial">+</text>
    <text x="772" y="395" font-size="12.5" fill="#c9c2b6" font-weight="600" font-family="Pretendard, -apple-system, BlinkMacSystemFont, Arial">Opus 4.7 적용됨⌄</text>
    <g transform="translate(899,390)">
      <path d="M0 0c0 6-4 10-9 10s-9-4-9-10" fill="none" stroke="#c9c2b6" stroke-width="1.8" stroke-linecap="round" opacity=".9"/>
      <rect x="-13" y="-17" width="8" height="19" rx="4" fill="none" stroke="#c9c2b6" stroke-width="1.8" opacity=".9"/>
      <line x1="-9" y1="10" x2="-9" y2="16" stroke="#c9c2b6" stroke-width="1.8" stroke-linecap="round" opacity=".9"/>
    </g>
  </g>

  <!-- shortcut chips -->
  <g font-family="Pretendard, -apple-system, BlinkMacSystemFont, Arial" font-size="12" fill="#c0baaf">
    <g transform="translate(421,438)">
      <rect width="58" height="24" rx="7" fill="#23231f" stroke="#33322d"/>
      <text x="29" y="16" text-anchor="middle">&lt;/&gt; 코드</text>
    </g>
    <g transform="translate(486,438)">
      <rect width="77" height="24" rx="7" fill="#23231f" stroke="#33322d"/>
      <text x="38.5" y="16" text-anchor="middle">⌁ 전략 수립</text>
    </g>
    <g transform="translate(570,438)">
      <rect width="76" height="24" rx="7" fill="#23231f" stroke="#33322d"/>
      <text x="38" y="16" text-anchor="middle">✎ 작성하기</text>
    </g>
    <g transform="translate(656,438)">
      <rect width="100" height="24" rx="7" fill="#23231f" stroke="#33322d"/>
      <text x="50" y="16" text-anchor="middle">▣ Calendar에서</text>
    </g>
    <g transform="translate(766,438)">
      <rect width="96" height="24" rx="7" fill="#23231f" stroke="#33322d"/>
      <text x="48" y="16" text-anchor="middle">M Gmail에서</text>
    </g>
  </g>

  <!-- guide callout -->
  <g filter="url(#panelShadow)">
    <rect x="370" y="520" width="540" height="78" rx="18" fill="#25231f" stroke="#3a352e"/>
    <text x="640" y="552" text-anchor="middle" font-size="18" fill="#eee8de" font-weight="800" font-family="Pretendard, -apple-system, BlinkMacSystemFont, Arial">이 입력창이 보이면 정상입니다</text>
    <text x="640" y="580" text-anchor="middle" font-size="14" fill="#aaa39a" font-family="Pretendard, -apple-system, BlinkMacSystemFont, Arial">여기에 내 업무를 자연어로 쓰고 Enter를 누르면 됩니다.</text>
  </g>

</svg>
