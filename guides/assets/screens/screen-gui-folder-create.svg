<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">GUI에서 프로젝트 폴더를 만드는 예시</title>
  <desc id="desc">Antigravity나 Cursor 같은 편집기에서 왼쪽 탐색기에서 새 폴더를 만드는 흐름을 보여주는 예시 화면</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.22"/></filter>
    <style>
      .sans{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.bg{fill:#f6f7fb}.app{fill:#151719;filter:url(#shadow)}.top{fill:#1d1f23}.side{fill:#171a1f}.panel{fill:#101214}.line{stroke:#2d333b;stroke-width:1}.txt{fill:#e5e7eb}.muted{fill:#9ca3af}.blue{fill:#1f6feb}.green{fill:#22c55e}.menu{fill:#202327;stroke:#3b424d;stroke-width:1}.menuHi{fill:#2563eb}.folder{fill:#cbd5e1}.small{font-size:20px}.body{font-size:24px}.title{font-size:28px;font-weight:800}.label{font-size:19px;font-weight:700}.hint{fill:#dbeafe}.call{fill:#eff6ff;stroke:#93c5fd;stroke-width:2}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675" rx="34"/>
  <rect x="58" y="44" width="1084" height="586" rx="24" class="app"/>
  <rect x="58" y="44" width="1084" height="50" rx="24" class="top"/>
  <rect x="58" y="70" width="1084" height="24" class="top"/>
  <circle cx="88" cy="69" r="8" fill="#ff5f57"/><circle cx="114" cy="69" r="8" fill="#ffbd2e"/><circle cx="140" cy="69" r="8" fill="#28c840"/>
  <text x="570" y="76" text-anchor="middle" class="sans small muted">Workspace</text>
  <rect x="58" y="94" width="54" height="536" fill="#111418"/>
  <rect x="112" y="94" width="290" height="536" class="side"/>
  <rect x="402" y="94" width="430" height="536" class="panel"/>
  <rect x="832" y="94" width="310" height="536" fill="#181a1e"/>
  <line x1="112" y1="94" x2="112" y2="630" class="line"/><line x1="402" y1="94" x2="402" y2="630" class="line"/><line x1="832" y1="94" x2="832" y2="630" class="line"/>

  <text x="132" y="132" class="sans body txt">탐색기</text>
  <text x="370" y="132" text-anchor="end" class="sans body muted">＋ ⟳</text>
  <text x="138" y="174" class="sans small txt">▾ Workspace</text>
  <rect x="132" y="194" width="250" height="34" rx="6" fill="#0f141a"/>
  <text x="156" y="218" class="sans small folder">▸ 📁 .claude</text>
  <rect x="132" y="230" width="250" height="36" rx="6" class="blue"/>
  <text x="156" y="254" class="sans small txt">▸ 📁 01_project_threads</text>
  <text x="156" y="292" class="sans small folder">▸ 📁 02_client_report</text>
  <text x="156" y="330" class="sans small folder">▸ 📁 03_content_ideas</text>

  <rect x="205" y="346" width="258" height="278" rx="12" class="menu"/>
  <text x="225" y="378" class="sans small txt">새 파일...</text>
  <rect x="215" y="392" width="228" height="34" rx="8" class="menuHi"/>
  <text x="225" y="416" class="sans small txt">새 폴더...</text>
  <text x="225" y="454" class="sans small muted">Finder에서 표시</text>
  <text x="225" y="492" class="sans small muted">통합 터미널에 열기</text>
  <text x="225" y="530" class="sans small muted">경로 복사</text>
  <text x="225" y="568" class="sans small muted">폴더 설정 열기</text>
  <text x="225" y="606" class="sans small muted">작업 영역에 폴더 추가...</text>

  <text x="438" y="135" class="sans body muted">터미널</text>
  <text x="438" y="178" class="mono small txt">Claude Code v2.1.123</text>
  <text x="438" y="210" class="mono small muted">~/Desktop/Workspace</text>
  <line x1="432" y1="246" x2="804" y2="246" stroke="#3b424d" stroke-width="2"/>
  <text x="438" y="292" class="mono small txt">›</text>
  <text x="470" y="292" class="mono small muted">GUI에서 폴더를 만든 뒤 여기서 claude만 실행</text>
  <text x="438" y="348" class="mono small txt">📁 Workspace  /  01_project_threads</text>
  <text x="438" y="388" class="mono small hint">이제 왼쪽에서 만든 폴더가 작업 기준이 됩니다.</text>

  <path d="M510 446 C438 420 360 392 304 417" fill="none" stroke="#93c5fd" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 10"/>
  <polygon points="294,414 321,404 313,431" fill="#93c5fd"/>
  <rect x="492" y="426" width="310" height="92" rx="18" class="call"/>
  <text x="516" y="462" class="sans label" fill="#1e3a8a">비개발자 기준 추천</text>
  <text x="516" y="496" class="sans small" fill="#334155">mkdir/cd 대신 왼쪽 탐색기에서</text>
  <text x="516" y="524" class="sans small" fill="#334155">우클릭 → 새 폴더를 먼저 사용하세요.</text>

  <text x="914" y="286" text-anchor="middle" class="sans title txt">Antigravity / Cursor</text>
  <text x="914" y="326" text-anchor="middle" class="sans small muted">왼쪽 폴더 목록에서</text>
  <text x="914" y="358" text-anchor="middle" class="sans small muted">새 폴더 만들기</text>
</svg>
