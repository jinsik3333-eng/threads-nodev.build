<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F5F3FF"/><stop offset="1" stop-color="#EFF6FF"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#6366F1" flood-opacity="0.16"/></filter></defs>
<rect width="1200" height="760" rx="36" fill="url(#bg)"/>
<text x="64" y="84" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="38" font-weight="800" fill="#111827">같은 방 vs 별도 작업방</text>
<text x="64" y="126" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="22" font-weight="500" fill="#6B7280">Skills는 반복 설명 저장, Sub-agents는 역할별 도우미에게 분담입니다.</text>
<g filter="url(#shadow)"><rect x="90" y="200" width="470" height="350" rx="28" fill="#FFFFFF" stroke="#E5E7EB"/>
<circle cx="128" cy="242" r="15" fill="#6366F1" opacity="0.18"/><circle cx="128" cy="242" r="7" fill="#6366F1"/>
<text x="158" y="250" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800" fill="#111827">Skills = 같은 방</text>
<text x="124" y="298" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">지금 대화 안에서 실행</text>
<text x="124" y="332" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">반복 설명을 짧게 줄임</text>
<text x="124" y="366" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">예: /weekly-report</text>
<text x="124" y="400" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563"></text>
<text x="124" y="434" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">초보자는 Skills부터</text>
</g>
<g filter="url(#shadow)"><rect x="640" y="200" width="470" height="350" rx="28" fill="#FFFFFF" stroke="#E5E7EB"/>
<circle cx="678" cy="242" r="15" fill="#10B981" opacity="0.18"/><circle cx="678" cy="242" r="7" fill="#10B981"/>
<text x="708" y="250" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800" fill="#111827">Sub-agents = 별도 작업방</text>
<text x="674" y="298" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">리서치/작성/검수 분담</text>
<text x="674" y="332" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">중간 과정은 따로 처리</text>
<text x="674" y="366" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">핵심 결과만 돌아옴</text>
<text x="674" y="400" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563"></text>
<text x="674" y="434" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="600" fill="#4B5563">큰 작업에만 사용</text>
</g>
</svg>