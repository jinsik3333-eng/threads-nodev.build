<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Shift Tab 두 번으로 Plan Mode에 들어가는 화면 변화</title>
  <desc id="desc">Claude Code 화면에서 Shift Tab을 두 번 누르면 기본 모드에서 Plan Mode로 바뀌는 과정을 반복 애니메이션으로 보여준다.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#1e293b" flood-opacity="0.18"/></filter>
    <style>
      .bg{fill:#f7f7fd}.window{fill:#0f1117;stroke:#20293a;stroke-width:2;filter:url(#shadow)}.bar{fill:#171d29}.muted{fill:#94a3b8}.text{fill:#f8fafc}.sub{fill:#cbd5e1}.line{stroke:#334155;stroke-width:3}.key{fill:#1f2937;stroke:#53637a;stroke-width:2}.frame{opacity:0}.f0{animation:show0 5.2s infinite}.f1{animation:show1 5.2s infinite}.f2{animation:show2 5.2s infinite}.f3{animation:show3 5.2s infinite}@keyframes show0{0%,19%{opacity:1}20%,100%{opacity:0}}@keyframes show1{0%,19%{opacity:0}20%,39%{opacity:1}40%,100%{opacity:0}}@keyframes show2{0%,39%{opacity:0}40%,67%{opacity:1}68%,100%{opacity:0}}@keyframes show3{0%,67%{opacity:0}68%,100%{opacity:1}}.press1{animation:pulse1 5.2s infinite}.press2{animation:pulse2 5.2s infinite}@keyframes pulse1{0%,19%,40%,100%{opacity:0}20%,39%{opacity:1}}@keyframes pulse2{0%,39%,68%,100%{opacity:0}40%,67%{opacity:1}}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.sans{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif}.kbd{font-size:33px;font-weight:800}.small{font-size:23px}.body{font-size:27px}.title{font-size:35px;font-weight:800}.caption{font-size:21px}.dotOn{fill:#60a5fa}.dotOff{fill:#334155}.default{fill:#334155}.purple{fill:#7c3aed}.blue{fill:#2563eb}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675" rx="34"/>
  <rect x="82" y="70" width="1036" height="520" rx="28" class="window"/>
  <path d="M82 98a28 28 0 0 1 28-28h980a28 28 0 0 1 28 28v48H82z" class="bar"/>
  <circle cx="112" cy="111" r="9" fill="#ff5f57"/><circle cx="142" cy="111" r="9" fill="#ffbd2e"/><circle cx="172" cy="111" r="9" fill="#28c840"/>
  <text x="206" y="119" class="sans small sub">Claude Code — Shift+Tab으로 모드 전환</text>
  <rect x="900" y="91" width="178" height="40" rx="14" fill="#273449"/><text x="922" y="118" class="sans caption text">움직이는 화면 예시</text>

  <text x="128" y="202" class="mono body muted">› 작업 지시 입력 중</text>
  <text x="128" y="252" class="mono kbd text">블로그 초안을 보고 목차를 정리해줘</text>

  <rect x="128" y="315" width="220" height="68" rx="16" class="key"/><text x="160" y="360" class="mono kbd text">Shift</text>
  <text x="374" y="360" class="mono kbd muted">+</text>
  <rect x="420" y="315" width="160" height="68" rx="16" class="key"/><text x="460" y="360" class="mono kbd text">Tab</text>
  <rect x="116" y="303" width="476" height="92" rx="24" fill="none" stroke="#a78bfa" stroke-width="5" class="press1"/>
  <rect x="116" y="303" width="476" height="92" rx="24" fill="none" stroke="#60a5fa" stroke-width="5" class="press2"/>

  <g class="frame f0">
    <text x="128" y="427" class="sans small sub">처음 화면</text>
    <rect x="675" y="190" width="330" height="245" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="704" y="232" class="sans caption muted">화면에서 바뀌는 부분</text>
    <rect x="704" y="258" width="256" height="58" rx="20" class="default"/><text x="732" y="297" class="sans title text">기본 작업 모드</text>
    <text x="704" y="365" class="mono body text">일반 입력 상태</text>
    <text x="704" y="405" class="sans caption sub">Claude가 바로 작업을 진행할 수 있는 상태입니다.</text>
  </g>
  <g class="frame f1">
    <text x="128" y="427" class="sans small sub">Shift + Tab 1번</text>
    <rect x="675" y="190" width="330" height="245" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="704" y="232" class="sans caption muted">화면에서 바뀌는 부분</text>
    <rect x="704" y="258" width="256" height="58" rx="20" class="purple"/><text x="732" y="297" class="sans title text">모드 전환 중</text>
    <text x="704" y="365" class="mono body text">한 번 누른 상태</text>
    <text x="704" y="405" class="sans caption sub">화면 하단 상태가 바뀝니다. 한 번 더 누릅니다.</text>
  </g>
  <g class="frame f2">
    <text x="128" y="427" class="sans small sub">Shift + Tab 한 번 더</text>
    <rect x="675" y="190" width="330" height="245" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="704" y="232" class="sans caption muted">화면에서 바뀌는 부분</text>
    <rect x="704" y="258" width="256" height="58" rx="20" class="blue"/><text x="732" y="297" class="sans title text">Plan Mode</text>
    <text x="704" y="365" class="mono body text">계획 먼저 보기</text>
    <text x="704" y="405" class="sans caption sub">파일을 바로 수정하지 않고 계획만 보여줍니다.</text>
  </g>
  <g class="frame f3">
    <text x="128" y="427" class="sans small sub">계획 확인 후 진행</text>
    <rect x="675" y="190" width="330" height="245" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="704" y="232" class="sans caption muted">화면에서 바뀌는 부분</text>
    <rect x="704" y="258" width="256" height="58" rx="20" class="blue"/><text x="732" y="297" class="sans title text">계획 확인 화면</text>
    <text x="704" y="365" class="mono body text">괜찮으면 진행</text>
    <text x="704" y="405" class="sans caption sub">마음에 안 들면 방향을 고쳐 다시 요청합니다.</text>
  </g>

  <g class="sans caption">
    <circle cx="128" cy="530" r="10" class="dotOn"/><text x="160" y="538" fill="#e5e7eb">기본</text><line x1="206" y1="530" x2="288" y2="530" class="line"/>
    <circle cx="306" cy="530" r="10" class="dotOn"/><text x="338" y="538" fill="#e5e7eb">1번</text><line x1="384" y1="530" x2="466" y2="530" class="line"/>
    <circle cx="484" cy="530" r="10" class="dotOn"/><text x="516" y="538" fill="#e5e7eb">2번</text><line x1="562" y1="530" x2="644" y2="530" class="line"/>
    <circle cx="662" cy="530" r="10" class="dotOn"/><text x="694" y="538" fill="#e5e7eb">계획 확인</text>
  </g>
</svg>
